<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Portal BI</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/png" href="/favicon-32x32.png">
    <script src="https://cdn.jsdelivr.net/npm/powerbi-client@2.21.1/dist/powerbi.min.js"></script>
</head>
<body>
                <div class="app-container">
                    <aside class="sidebar">
            <div class="logo-area">
                <img src="logocmntrns.png" alt="Logo Caminho Veículos" class="logo-img">
            </div>
            <div class="profile-card">
                <div class="avatar" id="avatar">GH</div>
                <h3 id="txt-nome">Carregando...</h3>
                <div class="cargo" id="txt-cargo">Cargo</div>
                <div class="filial" id="txt-filial">Filial</div>

            </div>
            <nav class="menu-links" id="container-menu">
            </nav>

            <!-- Link para Admin (só aparece se for admin) -->
            <div id="admin-link" style="display: none; margin-top: 30px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.1);">
                <a href="admin.html" style="display: block; padding: 12px 15px; background: #667eea; color: white; text-align: center; border-radius: 6px; text-decoration: none; font-weight: 500; font-size: 14px; transition: background 0.3s; border: none;">
                    ⚙️ GERENCIAR USUÁRIOS
                </a>
            </div>   

            <div class="sidebar-buttons">
                <button id="btn-logout">Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <div id="reportContainer" style="width: 100%; height: 100vh; border: none; border-radius: 8px; overflow: hidden;">
                <iframe 
                    title="Power BI Report" 
                    width="100%" 
                    height="100%" 
                    src="https://app.powerbi.com/view?r=eyJrIjoiMWY4MTBiMDgtZGZmYy00NThjLTlhM2ItMGU3ZjJmNTZkOTc4IiwidCI6ImQ4ZGUyZjVlLTRiZDEtNDkwNS1iYzIzLTcxNTQ2NzU0ZjJkYyJ9&pageName=ReportSection" 
                    frameborder="0" 
                    allowFullScreen="true">
                </iframe>
            </div>
        </main>
    </div>

    <script src="dashboard.js"></script>
</body>
</html>
