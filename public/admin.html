<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>Admin - Portal BI</title>
    <link rel="stylesheet" href="style.css">
    <style>
    .main-content {
        flex: 1;
        display: block !important;
        padding: 20px;
        overflow-y: auto;
    }

    .admin-container {
        max-width: 1600px;
        margin: 0 auto;
        padding: 30px;
    }

    .admin-header {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        color: white;
        padding: 25px;
        border-radius: 12px;
        margin-bottom: 30px;
    }

    .admin-header h1 {
        margin: 0 0 5px 0;
        font-size: 28px;
    }

    .admin-header p {
        margin: 0;
        opacity: 0.9;
    }

    .usuarios-list {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)) !important;
        gap: 25px !important;
        width: 100% !important;
    }

    .usuario-card {
        background: white !important;
        border: 1px solid #e2e8f0 !important;
        border-radius: 10px !important;
        padding: 20px !important;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08) !important;
        transition: all 0.3s ease !important;
        display: flex !important;
        flex-direction: column !important;
    }

    .usuario-card:hover {
        box-shadow: 0 8px 16px rgba(0,0,0,0.12) !important;
        transform: translateY(-4px) !important;
    }

    .usuario-info {
        margin-bottom: 15px !important;
        flex: 1 !important;
    }

    .usuario-info h3 {
        margin: 0 0 12px 0 !important;
        color: #1e293b !important;
        font-size: 18px !important;
        font-weight: 600 !important;
    }

    .usuario-info p {
        margin: 8px 0 !important;
        color: #64748b !important;
        font-size: 13px !important;
    }

    .usuario-info strong {
        color: #475569 !important;
    }

    .usuario-actions {
        display: flex !important;
        gap: 10px !important;
    }

    .btn-editar {
        width: 100% !important;
        background: #667eea !important;
        color: white !important;
        border: none !important;
        padding: 10px !important;
        border-radius: 6px !important;
        cursor: pointer !important;
        font-size: 14px !important;
        font-weight: 500 !important;
    }

    .btn-editar:hover {
        background: #5568d3 !important;
    }

    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0,0,0,0.5);
        z-index: 1000;
        align-items: center;
        justify-content: center;
    }

    .modal.active {
        display: flex;
    }

    .modal-content {
        background: white;
        padding: 30px;
        border-radius: 10px;
        width: 90%;
        max-width: 420px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }

    .modal-content h2 {
        margin: 0 0 20px 0;
        color: #1e293b;
        font-size: 22px;
    }

    .form-group {
        margin-bottom: 18px;
    }

    .form-group label {
        display: block;
        margin-bottom: 8px;
        color: #475569;
        font-weight: 500;
        font-size: 14px;
    }

        .form-group input {
        width: 100%;
        padding: 10px 12px;
        border: 1px solid #cbd5e0;
        border-radius: 6px;
        font-size: 14px;
        box-sizing: border-box;
        color: #1e293b !important;
        background-color: #ffffff !important;
    }

    .form-group input::placeholder {
        color: #cbd5e0;
    }

    .form-group input:focus {
        outline: none;
        border-color: #667eea;
        box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
    }

    .modal-buttons {
        display: flex;
        gap: 10px;
        justify-content: flex-end;
        margin-top: 25px;
    }

    .btn-salvar {
        background: #48bb78;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
    }

    .btn-salvar:hover {
        background: #38a169;
    }

    .btn-cancelar {
        background: #cbd5e0;
        color: #2d3748;
        border: none;
        padding: 10px 20px;
        border-radius: 6px;
        cursor: pointer;
        font-size: 14px;
        font-weight: 500;
    }

    .btn-cancelar:hover {
        background: #a0aec0;
    }

    .mensagem {
        padding: 15px;
        border-radius: 6px;
        margin-bottom: 20px;
        display: none;
    }

    .mensagem.sucesso {
        background: #c6f6d5;
        color: #22543d;
        border: 1px solid #9ae6b4;
    }

    .mensagem.erro {
        background: #fed7d7;
        color: #742a2a;
        border: 1px solid #fc8181;
    }

    .mensagem.active {
        display: block;
    }

    @media (max-width: 768px) {
        .usuarios-list {
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)) !important;
        }
    }

    @media (max-width: 480px) {
        .usuarios-list {
            grid-template-columns: 1fr !important;
        }
    }
</style>
</head>
<body>
    <div class="app-container">
        <aside class="sidebar">
            <div class="logo-area">
                <h2>Portal BI <br> Caminho Veículos</h2>
            </div>
            <div class="profile-card">
                <div class="avatar" id="avatar">ADM</div>
                <h3 id="txt-nome">Admin</h3>
                <div class="cargo" id="txt-cargo">ADMINISTRADOR</div>
                <div class="filial" id="txt-filial">Sistema</div>
            </div>
            <nav class="menu-links">
                <a href="dashboard.html" class="menu-item">DASHBOARD</a>
                <a href="admin.html" class="menu-item active">ADMIN</a>
            </nav>

            <div class="sidebar-buttons">
                <button id="btn-logout">Sair</button>
            </div>
        </aside>

        <main class="main-content">
            <div class="admin-container">
                <div class="admin-header">
                    <h1>Gerenciar Usuários</h1>
                    <p>Edite cargo e filial dos usuários</p>
                </div>

                <div class="mensagem" id="mensagem"></div>

                <div class="usuarios-list" id="usuarios-list">
                    <p style="color: #a0aec0;">Carregando usuários...</p>
                </div>
            </div>
        </main>
    </div>

    <!-- Modal de Edição -->
    <div class="modal" id="modal-edicao">
        <div class="modal-content">
            <h2>Editar Usuário</h2>
            <form id="form-edicao">
                <div class="form-group">
                    <label>Nome</label>
                    <input type="text" id="edit-nome" required>
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="edit-email" disabled>
                </div>
                <div class="form-group">
                    <label>Cargo</label>
                    <input type="text" id="edit-cargo" required>
                </div>
                <div class="form-group">
                    <label>Filial</label>
                    <input type="text" id="edit-filial" required>
                </div>
                <div class="modal-buttons">
                    <button type="button" class="btn-cancelar" onclick="fecharModal()">Cancelar</button>
                    <button type="submit" class="btn-salvar">Salvar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
